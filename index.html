<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nations: The Video Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #222;
            color: white;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
        }

        /* Top HUD */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 20px;
            border-bottom: 2px solid #444;
            pointer-events: none;
            z-index: 10;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            min-width: 90px;
        }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            color: #aaa;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 15px;
            font-weight: bold;
            color: #0f0;
        }

        /* Sidebar */
        #sidebar {
            position: absolute;
            left: 10px;
            top: 100px;
            width: 130px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #555;
            text-align: center;
            z-index: 5;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar-title {
            font-size: 11px;
            color: #ddd;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #draggable-city {
            width: 50px;
            height: 50px;
            background-color: #ff4444;
            margin: 0 auto;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }

        #draggable-city:active { transform: scale(0.95); }

        .nav-btn {
            background: #444;
            border: 1px solid #666;
            color: #fff;
            padding: 6px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .nav-btn:hover { background: #555; }
        .nav-btn.rival { border-color: #f1c40f; color: #f1c40f; }

        /* Overlays */
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            background: #333;
            border: 3px solid #777;
            border-radius: 12px;
            padding: 20px;
            display: none;
            z-index: 200;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .btn {
            background: #444;
            color: white;
            border: 1px solid #666;
            padding: 8px;
            margin: 4px 0;
            width: 100%;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }

        .btn:hover:not(:disabled) { background: #555; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .close-btn { background: #aa4444; margin-top: 10px; }
        .trade-btn { background: #4a90e2; }
        .attack-btn { background: #e67e22; }

        #cost-indicator {
            position: absolute;
            pointer-events: none;
            background: white;
            color: black;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            display: none;
            z-index: 100;
        }

        #log {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 320px;
            height: 150px;
            background: rgba(0,0,0,0.85);
            font-size: 12px;
            padding: 10px;
            border-radius: 5px;
            overflow-y: auto;
            pointer-events: none;
            color: #eee;
            border: 1px solid #444;
        }

        .log-entry { margin-bottom: 4px; border-left: 3px solid #666; padding-left: 5px; }
        .log-warn { border-left-color: #ff4444; color: #ffbbbb; font-weight: bold; }
        .log-trade { border-left-color: #f1c40f; color: #f1c40f; font-weight: bold; }

        .vehicle-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div id="hud">
        <div class="stat-item">
            <span class="stat-label">Money</span>
            <span id="money-display" class="stat-value">$10,000</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Stage</span>
            <span id="stage-display" class="stat-value" style="color: #4a90e2;">Developing</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Zandite</span>
            <span id="zandite-display" class="stat-value" style="color: #00ffff;">0</span>
        </div>
        <div class="stat-item">
            <span id="resource-bonus-label" class="stat-label">Build Bonus</span>
            <span id="iron-display" class="stat-value" style="color: #bdc3c7;">0%</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Military</span>
            <span id="military-display" class="stat-value">S:0 | V:0</span>
        </div>
    </div>

    <div id="sidebar">
        <div class="sidebar-title">Construction</div>
        <div id="draggable-city" draggable="true">CITY</div>
        <hr style="width:100%; border:0; border-top:1px solid #444;">
        <div class="sidebar-title">Navigation</div>
        <button class="nav-btn" onclick="focusOnNation('player')">Go to Nation</button>
        <button class="nav-btn rival" onclick="focusOnNation('rival')">Go to Rival</button>
    </div>

    <div id="cost-indicator">Cost: $0</div>

    <div id="city-overlay" class="overlay">
        <h2 id="overlay-title">City Management</h2>
        <p id="overlay-info"></p>
        
        <div id="player-actions">
            <button id="btn-train-soldier" class="btn" onclick="buyUnit('soldier')">Train Soldier (1 Zandite)</button>
            <div class="vehicle-grid">
                <button id="buy-car" class="btn" onclick="buyUnit('car')">Build Car</button>
                <button id="buy-boat" class="btn" onclick="buyUnit('boat')">Build Boat</button>
                <button id="buy-plane" class="btn" onclick="buyUnit('plane')">Build Plane</button>
            </div>
        </div>

        <div id="rival-actions" style="display:none;">
            <button id="btn-trade" class="btn trade-btn" onclick="attemptTrade()">Trade for City ($5,000)</button>
            <button id="btn-attack" class="btn attack-btn" onclick="attemptAttack()">Attack City</button>
        </div>
        <button class="btn close-btn" onclick="closeOverlay()">Close</button>
    </div>

    <div id="interaction-overlay" class="overlay">
        <h2 id="interaction-title">Incoming Transmission</h2>
        <p id="interaction-message" style="margin-bottom: 15px; line-height: 1.4;"></p>
        <div id="interaction-buttons"></div>
    </div>

    <div id="mine-overlay" class="overlay">
        <h2>Deep Mine</h2>
        <p>Mining is <b>FREE</b>!</p>
        <button id="mine-btn-primary" class="btn" onclick="mineOre()" style="background: #27ae60;">Mine for Ores (FREE)</button>
        <button class="btn close-btn" onclick="closeMine()">Close</button>
    </div>

    <div id="log"></div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const moneyDisplay = document.getElementById('money-display');
    const zanditeDisplay = document.getElementById('zandite-display');
    const ironDisplay = document.getElementById('iron-display');
    const stageDisplay = document.getElementById('stage-display');
    const log = document.getElementById('log');

    // CONFIGURATION
    const RECOGNITION_TIME = 2 * 60 * 1000; 
    const RIVAL_EXPANSION_CHANCE = 0.03;   

    let gameState = {
        money: 10000,
        zandite: 0,
        buildingResourceCount: 0,
        soldiers: 0,
        vehicles: { car: 0, boat: 0, plane: 0 },
        isDeveloping: true,
        playerCities: [], 
        rivalCities: [],
        // EQUALIZED: Rival now starts with same $10k as player
        rivalMoney: 10000, 
        rivalZandite: 20,
        rivalSoldiers: 8,
        rivalVehicles: { car: 3, boat: 0, plane: 1 },
        camera: { x: window.innerWidth / 2, y: window.innerHeight / 2 },
        hexSize: 40,
        isDragging: false,
        isPanning: false,
        lastMousePos: { x: 0, y: 0 },
        selectedCity: null,
        mineCooldown: false,
        globalRecognition: false, 
        lastInteractionTime: Date.now()
    };

    const BASE_COSTS = { car: 800, boat: 1200, plane: 2500 };
    const HEX_NEIGHBORS = [
        {q:1, r:0}, {q:1, r:-1}, {q:0, r:-1},
        {q:-1, r:0}, {q:-1, r:1}, {q:0, r:1}
    ];

    const TERRAIN = {
        MOUNTAIN: { color: '#D8BFD8', name: 'Mountain', cost: 3000, buildable: true, defenseBonus: 2.0 },
        VALLEY: { color: '#90EE90', name: 'Valley', cost: 2000, buildable: true, defenseBonus: 1.0 },
        MINE: { color: '#8B4513', name: 'Mine', cost: 0, buildable: false },
        WATER: { color: '#00008B', name: 'Water', cost: 0, buildable: false }
    };

    function init() {
        let q = 12, r = -6; 
        while (!getTerrainAt(q, r).buildable) q++;
        gameState.rivalCities.push({ q, r, terrain: getTerrainAt(q,r).name, createdAt: Date.now(), isRecognized: true });

        resize();
        window.addEventListener('resize', resize);
        addLog("Nations balanced. Drag a city to begin your journey.", "log-trade");
        updateHUD();
        render();
        gameLoop();
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function addLog(msg, type = '') {
        const div = document.createElement('div');
        div.className = `log-entry ${type}`;
        div.innerHTML = `> ${msg}`;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }

    function getTerrainAt(q, r) {
        const val = (Math.abs(Math.sin(q * 12.9 + r * 78.2) * 43758.5) % 1);
        if (val < 0.15) return TERRAIN.MOUNTAIN;
        if (val < 0.25) return TERRAIN.MINE;
        if (val < 0.40) return TERRAIN.WATER;
        return TERRAIN.VALLEY;
    }

    function isInsideRivalBorder(q, r) {
        return gameState.rivalCities.some(city => {
            if (city.q === q && city.r === r) return true;
            return HEX_NEIGHBORS.some(n => city.q + n.q === q && city.r + n.r === r);
        });
    }

    function isInsidePlayerBorder(q, r) {
        return gameState.playerCities.some(city => {
            if (city.q === q && city.r === r) return true;
            return HEX_NEIGHBORS.some(n => city.q + n.q === q && city.r + n.r === r);
        });
    }

    function hexToPixel(q, r) {
        const x = gameState.hexSize * (3/2 * q);
        const y = gameState.hexSize * (Math.sqrt(3)/2 * q + Math.sqrt(3) * r);
        return { x: x + gameState.camera.x, y: y + gameState.camera.y };
    }

    function pixelToHex(x, y) {
        const px = x - gameState.camera.x;
        const py = y - gameState.camera.y;
        const q = Math.round((2/3 * px) / gameState.hexSize);
        const r = Math.round((-1/3 * px + Math.sqrt(3)/3 * py) / gameState.hexSize);
        return { q, r };
    }

    function focusOnNation(type) {
        const list = type === 'player' ? gameState.playerCities : gameState.rivalCities;
        if (list.length === 0) return;
        const target = list[Math.floor(Math.random()*list.length)];
        const pixel = hexToPixel(target.q, target.r);
        gameState.camera.x = (window.innerWidth / 2) - (pixel.x - gameState.camera.x);
        gameState.camera.y = (window.innerHeight / 2) - (pixel.y - gameState.camera.y);
    }

    function gameLoop() {
        const now = Date.now();

        if (!gameState.globalRecognition && gameState.playerCities.length > 0) {
            const firstCity = gameState.playerCities[0];
            if (now - firstCity.createdAt >= RECOGNITION_TIME) {
                addLog("INTEL: The Yellow Nation has spotted you. Direct contact established.", "log-warn");
                gameState.globalRecognition = true;
            }
        }

        if (gameState.playerCities.length > 0) {
            rivalAI();
        }
        
        // ECONOMY EQUALIZED: Both earn 2.5 per city per tick
        gameState.money += gameState.playerCities.length * 2.5;
        gameState.rivalMoney += gameState.rivalCities.length * 2.5; 
        
        if (gameState.playerCities.length > 0 && Math.random() < 0.02) gameState.zandite++;
        if (gameState.rivalCities.length > 0 && Math.random() < 0.04) gameState.rivalZandite++;
        
        updateHUD();
        setTimeout(gameLoop, 100);
    }

    function rivalAI() {
        if (Math.random() < RIVAL_EXPANSION_CHANCE) { 
            const baseCity = gameState.rivalCities[Math.floor(Math.random() * gameState.rivalCities.length)];
            const offset = HEX_NEIGHBORS[Math.floor(Math.random()*6)];
            const nQ = baseCity.q + offset.q, nR = baseCity.r + offset.r;
            
            const terrain = getTerrainAt(nQ, nR);
            const occupied = gameState.playerCities.some(c=>c.q===nQ&&c.r===nR) || gameState.rivalCities.some(c=>c.q===nQ&&c.r===nR);
            
            if (terrain.buildable && !occupied && !isInsidePlayerBorder(nQ, nR)) {
                if (gameState.rivalMoney >= terrain.cost) {
                    gameState.rivalMoney -= terrain.cost;
                    gameState.rivalCities.push({ 
                        q: nQ, r: nR, terrain: terrain.name, createdAt: Date.now(), isRecognized: true 
                    });
                }
            }
        }
        
        const timeSinceLast = Date.now() - gameState.lastInteractionTime;
        if (gameState.globalRecognition && !gameState.isDeveloping && timeSinceLast > 45000 && Math.random() < 0.03) {
            triggerRivalInteraction();
        }

        if (gameState.rivalMoney > 3000 && Math.random() < 0.1) {
            if (gameState.rivalZandite >= 1) {
                gameState.rivalMoney -= 500; gameState.rivalZandite -= 1; gameState.rivalSoldiers++;
            } else if (gameState.rivalMoney > 6000) {
                gameState.rivalMoney -= 2500; gameState.rivalVehicles.plane++;
            }
        }
    }

    function triggerRivalInteraction() {
        gameState.lastInteractionTime = Date.now();
        const overlay = document.getElementById('interaction-overlay');
        const msg = document.getElementById('interaction-message');
        const buttons = document.getElementById('interaction-buttons');
        buttons.innerHTML = '';
        overlay.style.display = 'block';

        if (Math.random() < 0.4) {
            document.getElementById('interaction-title').innerText = "Yellow Nation: Aggression";
            msg.innerText = "The Yellow Nation is testing your borders. Pay $3,000 tribute or defend your territory.";
            
            const payBtn = document.createElement('button');
            payBtn.className = "btn trade-btn";
            payBtn.innerText = "Pay Tribute ($3,000)";
            payBtn.onclick = () => {
                if (gameState.money >= 3000) {
                    gameState.money -= 3000;
                    gameState.rivalMoney += 3000;
                    addLog("Paid tribute. Conflict avoided.", "log-trade");
                } else {
                    addLog("Insufficient funds for tribute! Battle begins.", "log-warn");
                    handleSkirmish();
                }
                overlay.style.display = 'none';
            };

            const resistBtn = document.createElement('button');
            resistBtn.className = "btn attack-btn";
            resistBtn.innerText = "Defend Borders";
            resistBtn.onclick = () => {
                handleSkirmish();
                overlay.style.display = 'none';
            };
            buttons.appendChild(payBtn);
            buttons.appendChild(resistBtn);
        } else {
            document.getElementById('interaction-title').innerText = "Yellow Nation: Diplomatic Trade";
            msg.innerText = "They offer $10,000 for one of your cities. Do you accept?";
            
            const acceptBtn = document.createElement('button');
            acceptBtn.className = "btn trade-btn";
            acceptBtn.innerText = "Sell City ($10,000)";
            acceptBtn.onclick = () => {
                if (gameState.playerCities.length > 1) {
                    const city = gameState.playerCities.pop();
                    gameState.money += 10000;
                    gameState.rivalCities.push({...city, isRecognized: true});
                    addLog("City sold to the Yellow Nation.", "log-trade");
                } else {
                    addLog("Denied: You must keep your capital city.");
                }
                overlay.style.display = 'none';
            };

            const declineBtn = document.createElement('button');
            declineBtn.className = "btn close-btn";
            declineBtn.innerText = "Decline";
            declineBtn.onclick = () => {
                addLog("Trade offer declined.");
                overlay.style.display = 'none';
            };
            buttons.appendChild(acceptBtn);
            buttons.appendChild(declineBtn);
        }
    }

    function handleSkirmish() {
        let pPower = gameState.soldiers + (gameState.vehicles.car * 2) + (gameState.vehicles.plane * 5);
        let rPower = gameState.rivalSoldiers + (gameState.rivalVehicles.car * 1) + (gameState.rivalVehicles.plane * 3);
        
        if (pPower >= rPower) {
            addLog("VICTORY! The Yellow Nation retreated and lost resources.", "log-trade");
            gameState.soldiers = Math.max(0, gameState.soldiers - 1);
            gameState.rivalSoldiers = Math.max(0, gameState.rivalSoldiers - 2);
            gameState.rivalMoney = Math.max(0, gameState.rivalMoney - 1000);
        } else {
            addLog("DEFEAT! They looted $2,000 from your treasury.", "log-warn");
            gameState.money = Math.max(0, gameState.money - 2000);
            gameState.rivalMoney += 2000;
            gameState.soldiers = Math.floor(gameState.soldiers * 0.4);
            gameState.vehicles.car = Math.floor(gameState.vehicles.car * 0.5);
        }
        updateHUD();
    }

    function buyUnit(type) {
        if (type === 'soldier') {
            if (gameState.zandite >= 1) {
                gameState.zandite -= 1; gameState.soldiers++;
                if (gameState.isDeveloping) {
                    gameState.isDeveloping = false;
                    addLog("PROGRESS: Nation status updated to ACTIVE.", "log-warn");
                }
            } else return addLog("Need Zandite for soldiers.");
        } else {
            if (gameState.isDeveloping) return addLog("Build a military first.");
            const cost = Math.floor(BASE_COSTS[type] * (1 - Math.min(0.5, gameState.buildingResourceCount * 0.05)));
            if (gameState.money >= cost) {
                gameState.money -= cost; gameState.vehicles[type]++;
            } else return addLog("Not enough money.");
        }
        updateHUD();
        closeOverlay();
    }

    function updateHUD() {
        moneyDisplay.innerText = `$${Math.floor(gameState.money).toLocaleString()}`;
        zanditeDisplay.innerText = gameState.zandite;
        ironDisplay.innerText = `${Math.min(50, gameState.buildingResourceCount * 5)}%`;
        const totalV = gameState.vehicles.car + gameState.vehicles.boat + gameState.vehicles.plane;
        document.getElementById('military-display').innerText = `S:${gameState.soldiers} | V:${totalV}`;
        
        if (gameState.isDeveloping) {
            stageDisplay.innerText = "Developing"; stageDisplay.style.color = "#4a90e2";
        } else {
            stageDisplay.innerText = "Active"; stageDisplay.style.color = "#0f0";
        }
    }

    function mineOre() {
        if (gameState.mineCooldown) return;
        gameState.mineCooldown = true;
        const btn = document.getElementById('mine-btn-primary');
        btn.disabled = true;
        let sec = 2;
        const timer = setInterval(() => {
            sec--;
            if (sec > 0) btn.innerText = `Recharging (${sec}s)...`;
            else {
                clearInterval(timer); gameState.mineCooldown = false;
                btn.disabled = false; btn.innerText = "Mine for Ores (FREE)";
            }
        }, 1000);
        const r = Math.random();
        if (r < 0.1) { gameState.zandite += 2; addLog("Mined 2 Zandite!"); } 
        else if (r < 0.5) { gameState.buildingResourceCount++; addLog("Found Building Materials!"); }
        else { gameState.money += 200; addLog("Mined Gold ($200)"); }
        updateHUD();
    }

    function attemptTrade() {
        if (Math.random() < 0.3) {
            addLog("The Yellow Nation politely declines your offer. Their territory is not for sale today.", "log-warn");
            closeOverlay();
            return;
        }

        if (gameState.money < 5000) return addLog("Need $5,000 for diplomatic purchase.");
        if (gameState.rivalCities.length <= 1) return addLog("They refuse to sell their capital.");
        
        gameState.money -= 5000;
        gameState.rivalMoney += 5000;
        gameState.rivalCities = gameState.rivalCities.filter(c => c !== gameState.selectedCity);
        gameState.playerCities.push({ ...gameState.selectedCity, terrain: getTerrainAt(gameState.selectedCity.q, gameState.selectedCity.r).name, createdAt: Date.now(), isRecognized: true });
        addLog("Territory purchased peacefully.", "log-trade");
        closeOverlay();
    }

    function attemptAttack() {
        if (gameState.isDeveloping) return addLog("Military presence required.");
        const terrain = getTerrainAt(gameState.selectedCity.q, gameState.selectedCity.r);
        let pPower = gameState.soldiers + (gameState.vehicles.car * 2) + (gameState.vehicles.plane * 5);
        let rPower = (gameState.rivalSoldiers + (gameState.rivalVehicles.car * 2) + (gameState.rivalVehicles.plane * 5)) * terrain.defenseBonus;
        
        if (pPower * (0.8 + Math.random() * 0.4) > rPower) {
            addLog("INVASION SUCCESS! Territory annexed.", "log-trade");
            gameState.rivalCities = gameState.rivalCities.filter(c => c !== gameState.selectedCity);
            gameState.playerCities.push({ ...gameState.selectedCity, terrain: terrain.name, createdAt: Date.now(), isRecognized: true });
            gameState.soldiers = Math.floor(gameState.soldiers * 0.7);
            gameState.rivalMoney = Math.max(0, gameState.rivalMoney - 2000);
            gameState.rivalSoldiers = Math.floor(gameState.rivalSoldiers * 0.5);
        } else {
            addLog("INVASION FAILED! Significant losses.", "log-warn");
            gameState.soldiers = Math.floor(gameState.soldiers * 0.1);
            gameState.rivalMoney += 1000;
        }
        updateHUD(); closeOverlay();
    }

    document.getElementById('draggable-city').addEventListener('dragstart', (e) => {
        gameState.isDragging = true;
        const img = new Image(); img.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
        e.dataTransfer.setDragImage(img, 0, 0);
    });

    window.addEventListener('mouseup', (e) => {
        if (gameState.isDragging) {
            const hex = pixelToHex(e.clientX, e.clientY);
            const terrain = getTerrainAt(hex.q, hex.r);
            const occupied = gameState.playerCities.some(c=>c.q===hex.q&&c.r===hex.r) || gameState.rivalCities.some(c=>c.q===hex.q&&c.r===hex.r);
            let cost = (gameState.playerCities.length === 0) ? 0 : terrain.cost;
            if (terrain.buildable && !occupied && !isInsideRivalBorder(hex.q, hex.r) && gameState.money >= cost) {
                gameState.money -= cost;
                gameState.playerCities.push({ q: hex.q, r: hex.r, terrain: terrain.name, createdAt: Date.now(), isRecognized: false });
                updateHUD();
            }
        }
        gameState.isPanning = false; gameState.isDragging = false;
        document.getElementById('cost-indicator').style.display = 'none';
    });

    canvas.addEventListener('mousedown', (e) => {
        const hex = pixelToHex(e.clientX, e.clientY);
        const pCity = gameState.playerCities.find(c => c.q === hex.q && c.r === hex.r);
        if (pCity) return openCityOverlay(pCity, 'player');
        const rCity = gameState.rivalCities.find(c => c.q === hex.q && c.r === hex.r);
        if (rCity) return openCityOverlay(rCity, 'rival');
        if (getTerrainAt(hex.q, hex.r).name === 'Mine') {
            document.getElementById('mine-overlay').style.display = 'block'; return;
        }
        gameState.isPanning = true; gameState.lastMousePos = { x: e.clientX, y: e.clientY };
    });

    window.addEventListener('mousemove', (e) => {
        if (gameState.isPanning) {
            gameState.camera.x += e.clientX - gameState.lastMousePos.x;
            gameState.camera.y += e.clientY - gameState.lastMousePos.y;
            gameState.lastMousePos = { x: e.clientX, y: e.clientY };
        }
        if (gameState.isDragging) {
            const ind = document.getElementById('cost-indicator');
            ind.style.display = 'block'; ind.style.left = (e.clientX + 15) + 'px'; ind.style.top = (e.clientY + 15) + 'px';
            const hex = pixelToHex(e.clientX, e.clientY);
            const terrain = getTerrainAt(hex.q, hex.r);
            ind.innerText = terrain.buildable ? `Cost: $${gameState.playerCities.length === 0 ? 0 : terrain.cost}` : "Invalid Terrain";
        }
    });

    function openCityOverlay(city, type) {
        gameState.selectedCity = city;
        document.getElementById('city-overlay').style.display = 'block';
        document.getElementById('overlay-info').innerText = `Terrain: ${city.terrain}`;
        document.getElementById('overlay-title').innerText = type === 'player' ? "Your City" : "Yellow Nation Outpost";
        document.getElementById('player-actions').style.display = type === 'player' ? 'block' : 'none';
        document.getElementById('rival-actions').style.display = type === 'rival' ? 'block' : 'none';
        updateHUD();
    }

    function closeOverlay() { document.getElementById('city-overlay').style.display = 'none'; gameState.selectedCity = null; }
    function closeMine() { document.getElementById('mine-overlay').style.display = 'none'; }

    function drawHex(center, size, fill, stroke = '#333', width = 1) {
        ctx.save();
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
            let a = (Math.PI / 3) * i;
            let x = center.x + size * Math.cos(a), y = center.y + size * Math.sin(a);
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath(); 
        ctx.fillStyle = fill; ctx.fill(); 
        ctx.strokeStyle = stroke; ctx.lineWidth = width; ctx.stroke();
        ctx.restore();
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const start = pixelToHex(0, 0), end = pixelToHex(canvas.width, canvas.height);
        for (let q = start.q - 5; q <= end.q + 5; q++) {
            for (let r = start.r - 5; r <= end.r + 5; r++) {
                const center = hexToPixel(q, r); const terrain = getTerrainAt(q, r);
                const isRivalBorder = isInsideRivalBorder(q, r);
                const isPlayerBorder = isInsidePlayerBorder(q, r);
                const pCity = gameState.playerCities.find(c => c.q === q && c.r === r);
                const rCity = gameState.rivalCities.find(c => c.q === q && c.r === r);
                
                drawHex(center, gameState.hexSize, terrain.color);
                if (isRivalBorder && !rCity) drawHex(center, gameState.hexSize, 'rgba(241, 196, 15, 0.2)', 'rgba(241, 196, 15, 0.7)', 2);
                if (isPlayerBorder && !pCity) drawHex(center, gameState.hexSize, 'rgba(231, 76, 60, 0.1)', 'rgba(231, 76, 60, 0.5)', 2);

                if (rCity) drawHex(center, gameState.hexSize * 0.7, '#f1c40f', '#000', 3);
                if (pCity) drawHex(center, gameState.hexSize * 0.7, '#e74c3c', '#fff', 2);
            }
        }
        requestAnimationFrame(render);
    }
    init();
</script>
</body>
</html>
